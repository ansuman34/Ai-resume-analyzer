services:
  - type: web
    name: ai-resume-analyzer-api
    env: node
    plan: free
    buildCommand: cd Server && npm install
    startCommand: cd Server && npm start
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_SERVICE
        value: gmail
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://ai-resume-analyzer-1-yiis.onrender.com
      - key: NODE_ENV
        value: production

  - type: web
    name: ai-resume-analyzer
    runtime: static
    rootDir: Frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: REACT_APP_API_URL
        value: https://ai-resume-analyzer-api.onrender.com/api
      - key: REACT_APP_FIREBASE_API_KEY
        sync: false
      - key: GENERATE_SOURCEMAP
        value: "false"
